<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Music Player</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff6b6b,#6c5ce7,#00cec9,#fd79a8);
background-size:400% 400%;
animation:bgAnimation 12s ease infinite;
overflow:hidden;
}

@keyframes bgAnimation{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.player{
width:430px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:25px;
border-radius:30px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
border:1px solid rgba(255,255,255,.3);
color:white;
}

.player-title{
text-align:center;
font-size:28px;
margin-bottom:20px;
font-weight:bold;
letter-spacing:1px;
}

.album{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.album img{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:8px solid rgba(255,255,255,.3);
box-shadow:0 0 30px rgba(255,255,255,.4);
animation:spin 12s linear infinite;
animation-play-state:paused;
}

.album img.playing{
animation-play-state:running;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.song-info{
text-align:center;
margin-bottom:15px;
}

.song-info h2{
font-size:24px;
}

.song-info p{
opacity:.8;
margin-top:5px;
}

.time{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:14px;
}

#progress{
width:100%;
height:6px;
cursor:pointer;
accent-color:#00ffe0;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:25px;
}

.controls button{
width:60px;
height:60px;
border:none;
border-radius:50%;
font-size:22px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#00c6ff,#0072ff);
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.controls button:hover{
transform:scale(1.12);
}

.play{
width:75px !important;
height:75px !important;
font-size:28px !important;
background:linear-gradient(45deg,#ff416c,#ff4b2b)!important;
}

.volume-box{
display:flex;
align-items:center;
gap:10px;
margin-top:25px;
}

.volume-box i{
font-size:20px;
}

#volume{
flex:1;
cursor:pointer;
accent-color:#00ffe0;
}

.playlist{
margin-top:25px;
background:rgba(255,255,255,.1);
padding:15px;
border-radius:15px;
max-height:220px;
overflow-y:auto;
}

.playlist h3{
margin-bottom:12px;
text-align:center;
}

.playlist ul{
list-style:none;
}

.playlist li{
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,.08);
transition:.3s;
}

.playlist li:hover{
background:rgba(255,255,255,.25);
transform:translateX(5px);
}

.active{
background:linear-gradient(45deg,#00dbde,#fc00ff)!important;
font-weight:bold;
}

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:white;
border-radius:20px;
}

</style>
</head>
<body>

<div class="player">

<h1 class="player-title">🎵 Music Player</h1>

<div class="album">
<img id="cover"
src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=500">
</div>

<div class="song-info">
<h2 id="title">Song Name</h2>
<p id="artist">Artist Name</p>
</div>

<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<input type="range" id="progress" value="0">

<div class="controls">

<button id="prev">
<i class="fas fa-backward"></i>
</button>

<button class="play" id="play">
<i class="fas fa-play"></i>
</button>

<button id="next">
<i class="fas fa-forward"></i>
</button>

</div>

<div class="volume-box">
<i class="fas fa-volume-up"></i>
<input type="range"
id="volume"
min="0"
max="1"
step="0.1"
value="1">
</div>

<div class="playlist">

<h3>🎶 Playlist</h3>

<ul id="playlist"></ul>

</div>

</div>

<audio id="audio"></audio>

<script>

const songs = [

{
title:"Creative Minds",
artist:"Bensound",
src:"https://www.bensound.com/bensound-music/bensound-creativeminds.mp3",
cover:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=500"
},

{
title:"Sunny",
artist:"Bensound",
src:"https://www.bensound.com/bensound-music/bensound-sunny.mp3",
cover:"https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=500"
},

{
title:"Energy",
artist:"Bensound",
src:"https://www.bensound.com/bensound-music/bensound-energy.mp3",
cover:"https://images.unsplash.com/photo-1501612780327-45045538702b?w=500"
},

{
title:"Ukulele",
artist:"Bensound",
src:"https://www.bensound.com/bensound-music/bensound-ukulele.mp3",
cover:"https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=500"
},

{
title:"Going Higher",
artist:"Bensound",
src:"https://www.bensound.com/bensound-music/bensound-goinghigher.mp3",
cover:"https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=500"
}

];

const audio=document.getElementById("audio");
const playBtn=document.getElementById("play");
const nextBtn=document.getElementById("next");
const prevBtn=document.getElementById("prev");

const title=document.getElementById("title");
const artist=document.getElementById("artist");
const cover=document.getElementById("cover");

const progress=document.getElementById("progress");
const volume=document.getElementById("volume");

const currentTime=document.getElementById("currentTime");
const duration=document.getElementById("duration");

const playlist=document.getElementById("playlist");

let currentSong=0;

loadSong(currentSong);

function loadSong(index){

audio.src=songs[index].src;
title.innerText=songs[index].title;
artist.innerText=songs[index].artist;
cover.src=songs[index].cover;

document.querySelectorAll("#playlist li")
.forEach(item=>item.classList.remove("active"));

if(document.querySelectorAll("#playlist li")[index]){
document.querySelectorAll("#playlist li")[index]
.classList.add("active");
}
}

function playSong(){

audio.play();

playBtn.innerHTML=
'<i class="fas fa-pause"></i>';

cover.classList.add("playing");
}

function pauseSong(){

audio.pause();

playBtn.innerHTML=
'<i class="fas fa-play"></i>';

cover.classList.remove("playing");
}

playBtn.addEventListener("click",()=>{

if(audio.paused){
playSong();
}else{
pauseSong();
}

});

nextBtn.addEventListener("click",()=>{

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

loadSong(currentSong);
playSong();

});

prevBtn.addEventListener("click",()=>{

currentSong--;

if(currentSong<0){
currentSong=songs.length-1;
}

loadSong(currentSong);
playSong();

});

audio.addEventListener("timeupdate",()=>{

const progressPercent=
(audio.currentTime/audio.duration)*100;

progress.value=progressPercent||0;

currentTime.innerText=
formatTime(audio.currentTime);

duration.innerText=
formatTime(audio.duration);

});

progress.addEventListener("input",()=>{

audio.currentTime=
(progress.value/100)*audio.duration;

});

volume.addEventListener("input",()=>{

audio.volume=volume.value;

});

audio.addEventListener("ended",()=>{

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

loadSong(currentSong);
playSong();

});

function formatTime(time){

if(isNaN(time)) return "0:00";

const mins=Math.floor(time/60);
const secs=Math.floor(time%60);

return `${mins}:${secs<10?"0":""}${secs}`;

}

songs.forEach((song,index)=>{

const li=document.createElement("li");

li.innerHTML=
`🎵 ${song.title} - ${song.artist}`;

li.addEventListener("click",()=>{

currentSong=index;
loadSong(currentSong);
playSong();

});

playlist.appendChild(li);

});

loadSong(currentSong);

</script>

</body>
</html>
