<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colorful Scientific Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#ff6ec4,#7873f5,#42e695);
    }

    .calculator{
      width:360px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding:20px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .display{
      width:100%;
      height:70px;
      border:none;
      border-radius:15px;
      margin-bottom:20px;
      text-align:right;
      padding:15px;
      font-size:28px;
      background:white;
      color:#333;
      outline:none;
    }

    .buttons{
      display:grid;
      grid-template-columns: repeat(4,1fr);
      gap:12px;
    }

    button{
      height:60px;
      border:none;
      border-radius:15px;
      font-size:20px;
      cursor:pointer;
      transition:0.2s;
      color:white;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
    }

    .number{
      background:#6c63ff;
    }

    .operator{
      background:#ff6584;
    }

    .function{
      background:#00b894;
    }

    .equal{
      background:#fdcb6e;
      color:black;
    }

    .clear{
      background:#d63031;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <input type="text" class="display" id="display" readonly>

    <div class="buttons">

      <button class="function" onclick="append('Math.sin(')">sin</button>
      <button class="function" onclick="append('Math.cos(')">cos</button>
      <button class="function" onclick="append('Math.tan(')">tan</button>
      <button class="function" onclick="append('Math.log10(')">log</button>

      <button class="number" onclick="append('7')">7</button>
      <button class="number" onclick="append('8')">8</button>
      <button class="number" onclick="append('9')">9</button>
      <button class="operator" onclick="append('/')">÷</button>

      <button class="number" onclick="append('4')">4</button>
      <button class="number" onclick="append('5')">5</button>
      <button class="number" onclick="append('6')">6</button>
      <button class="operator" onclick="append('*')">×</button>

      <button class="number" onclick="append('1')">1</button>
      <button class="number" onclick="append('2')">2</button>
      <button class="number" onclick="append('3')">3</button>
      <button class="operator" onclick="append('-')">−</button>

      <button class="number" onclick="append('0')">0</button>
      <button class="number" onclick="append('.')">.</button>
      <button class="operator" onclick="append('+')">+</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="function" onclick="append('(')">(</button>
      <button class="function" onclick="append(')')">)</button>
      <button class="function" onclick="append('Math.sqrt(')">√</button>
      <button class="clear" onclick="clearDisplay()">C</button>

    </div>
  </div>

  <script>
    let display = document.getElementById("display");

    function append(value){
      display.value += value;
    }

    function clearDisplay(){
      display.value = "";
    }

    function calculate(){
      try{
        display.value = eval(display.value);
      }
      catch(error){
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
